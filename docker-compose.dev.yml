version: "3.9"

services:

  db:
    image: harbor.sahimco.ir/public/postgres:14.3.1-postgis
    container_name: postgres
    ports:
      - 5432:5432
    environment:
      - POSTGRES_DB=insighthub
      - POSTGRES_USER=ihub
      - POSTGRES_PASSWORD=ihub
    volumes:
      - ./volumes/postgres-data:/var/lib/postgresql/data/

#  pgadmin:
#    container_name: pgadmin4_container
#    image: dpage/pgadmin4
#    restart: always
#    environment:
#      PGADMIN_DEFAULT_EMAIL: admin@admin.com
#      PGADMIN_DEFAULT_PASSWORD: 'pg_pass'
#    ports:
#      - "5050:80"

  rabbitmq:
    image: harbor.sahimco.ir/public/rabbitmq:4.0.9-management-alpine
    container_name: rabbitmq
    ports:
      - 5672:5672
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 30s
      retries: 3

  redis:
    image: harbor.sahimco.ir/public/redis:latest
    container_name: redis
    ports:
      - 6379:6379
    volumes:
      - redis-data:/data


volumes:
    postgres-data:
    redis-data:

